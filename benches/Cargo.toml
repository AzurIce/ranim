[package]
name = "ranim-benchmark"
version.workspace = true
authors.workspace = true
edition.workspace = true
repository.workspace = true
keywords.workspace = true
license.workspace = true
autobenches = false
publish = false

[[bench]]
name = "wgpu_benchmark"
harness = false
path = "benches/wgpu_benchmark/root.rs"

[dev-dependencies]
criterion = { version = "0.5.1", features = ["html_reports"] }

[dependencies]
wgpu.workspace = true
pollster.workspace = true
nanorand = "0.7.0"
rayon = "1.7.0"
profiling = "1.0.0"
naga = { version = "23.0.0", features = [
    "deserialize",
    "serialize",
    "wgsl-in",
    "spv-in",
    "glsl-in",
    "spv-out",
    "msl-out",
    "hlsl-out",
    "glsl-out",
    "wgsl-out",
] }
bytemuck = { version = "1.13.1", features = ["derive"] }
bincode = "1.3.3"
